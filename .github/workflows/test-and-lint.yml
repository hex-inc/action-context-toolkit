name: Test and Lint

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20.19
          cache: "npm"
      - name: Install dependencies
        run: npm install
      - name: Test
        run: npm run test
      - name: Lint
        run: npm run lint
      - name: Check for uncommitted changes
        run: |
          npm run build
          git diff HEAD --quiet --exit-code dist/index.js

          if [ $? -eq 1 ]
          then
            echo "Uncommitted changes detected in dist/index.js"
            echo "Please run 'npm run build' and commit the changes"
            exit 1
          else
            exit 0
          fi
